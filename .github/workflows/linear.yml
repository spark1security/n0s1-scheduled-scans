name: "Linear.app Secret Scan"

on:
  push:
    branches: [ "sarif-test" ]
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  secret_scanning:
    permissions: write-all
    runs-on: [ubuntu-latest]
    steps:
      - name: Scan Linear.app with n0s1-action
        uses: spark1security/n0s1-action@main
        env:
          LINEAR_TOKEN: ${{ secrets.LINEAR_TOKEN }}
        with:
          scan-target: 'linear_scan'
          report-format: "sarif"
          report-file: "report.sarif"
      - name: Display SARIF result
        run: |
          mv report.sarif temp.json
          jq -r '.startLine |= "1027"' temp.json > report.sarif
          rm temp.json
          mv report.sarif temp.json
          jq -r '.endLine |= "1027"' temp.json > report.sarif
          rm temp.json
          cat report.sarif | jq
      - name: Upload scan report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "report.sarif"
